name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi
          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}

  update:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: update
        shell: bash
        run: |
          mkdir -p ./update
          rsync -av --exclude='MaaCommonAssets' ./assets/ ./update/


      - uses: actions/upload-artifact@v4
        with:
          name: update
          path: "update"

  build:
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_key: win
            arch: x86_64
            mfa_arch: x64
            maa_os: win
          - os: ubuntu-latest
            os_key: linux
            arch: x86_64
            mfa_arch: x64
            maa_os: linux
          - os: ubuntu-latest
            os_key: linux
            arch: aarch64
            mfa_arch: arm64
            maa_os: linux
          - os: macos-latest
            os_key: osx    
            arch: x86_64
            mfa_arch: x64
            maa_os: macos
          - os: macos-latest
            os_key: osx
            arch: aarch64
            mfa_arch: arm64
            maa_os: macos

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.maa_os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ matrix.os_key }}-${{ matrix.mfa_arch }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Setup Embedded Python (Windows only)
        if: runner.os == 'Windows'
        run: |
          python ./tools/CI/setup_embed_python.py

      - name: Run Installer Script
        shell: bash
        run: |
          # 1. 先运行 Python 安装脚本
          # 这会生成 install 目录，放入 MAA 核心、资源、Agent 代码和配置好的 interface.json
          echo "Running install.py for version ${{ needs.meta.outputs.tag }}"
          
          # 根据平台选择 python 解释器 (Windows 用内嵌的，其他用系统的)
          if [ "${{ runner.os }}" == "Windows" ]; then
             ./install/python/python.exe ./tools/CI/install.py ${{ needs.meta.outputs.tag }}
          else
             python ./tools/CI/install.py ${{ needs.meta.outputs.tag }}
          fi
          
          echo "=== Copying MFA Frontend files ==="
          # 调试：看一眼 MFA 目录
          ls -R MFA

          # 2. 智能查找前端所在目录 (解决目录嵌套问题)
          # 找到包含 MFA.exe 或 MFAAvalonia 等文件的那个目录
          FRONTEND_SRC=$(find ./MFA -type f \( -name "MFA.exe" -o -name "MFAAvalonia.exe" -o -name "MFA" -o -name "MFAAvalonia" \) | head -n 1 | xargs dirname)

          if [ -z "$FRONTEND_SRC" ]; then
             echo "Error: Could not find MFA frontend files!"
             exit 1
          fi
          
          echo "Frontend source found at: $FRONTEND_SRC"

          # 3. 复制前端文件到 install 目录
          # -r: 递归
          # -p: 保留属性
          # -v: 显示过程
          # -n: (关键) 不覆盖已存在的文件。这样可以保护 install.py 生成的 interface.json 不被 MFA 自带的覆盖
          # 注意：如果 MFA 依赖的 dll 版本和 install_deps 里的不一致，这里可能需要权衡。
          # 通常我们希望前端的 dll 优先，但 interface.json 我们要保留自己的。
          # 所以策略是：先删除 install 中可能冲突的 dll (可选)，或者反过来，先拷 MFA 再跑 py。
          # 这里采用 M9A 参考逻辑：cp -n，保护 interface.json
          
          cp -rpvn "$FRONTEND_SRC"/. install/
          
          # 4. 重命名主程序 (MGA)
          echo "Renaming executable to MGA..."
          
          # Windows
          [ -f "./install/MFA.exe" ] && mv "./install/MFA.exe" "./install/MGA.exe"
          [ -f "./install/MFAAvalonia.exe" ] && mv "./install/MFAAvalonia.exe" "./install/MGA.exe"
          
          # Linux/macOS
          [ -f "./install/MFA" ] && mv "./install/MFA" "./install/MGA"
          [ -f "./install/MFAAvalonia" ] && mv "./install/MFAAvalonia" "./install/MGA"
          
          # 5. 赋予权限 & 最终检查
          if [ -f "./install/MGA" ]; then
            chmod +x "./install/MGA"
          fi

          if [ -f "./install/MGA.exe" ] || [ -f "./install/MGA" ]; then
             echo "Build success! Artifacts are ready in ./install"
          else
             echo "Error: MGA executable missing!"
             exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: MGA-${{ matrix.maa_os }}-${{ matrix.arch }}
          path: "install"
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, build, update] 
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Zip Artifacts
        run: |
          cd assets
          for f in *; do
            if [ -d "$f" ]; then
              echo "Zipping artifact: $f"
              (cd "$f" && zip -r "../$f-${{ needs.meta.outputs.tag }}.zip" .)
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}